<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGITATOR: OATHSWORN_TRACKER</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="globals.css">
    <style>
        .oath-panel { border-left-color: var(--primary); }
        
        .setup-card {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            text-align: center;
        }

        .battle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .battle-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 1.5rem;
            transition: 0.3s;
        }

        .battle-card.completed {
            border-left: 4px solid var(--success);
        }

        .input-cogitator {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.5rem;
            width: 100%;
            font-family: 'Share Tech Mono', monospace;
        }

        .input-cogitator:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 10px var(--primary-dim);
        }

        .stat-badge {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 0.2rem;
            display: block;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
        }

        .cog-spinner {
            font-size: 3rem;
            color: var(--primary);
            animation: fa-spin 2s infinite linear;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="antialiased">
    <div class="hud-vignette"></div>

    <header class="main-header">
        <div class="title-container">
            <h1>OATHSWORN TRACKER</h1>
            <p class="sub-readout">COGITATOR MODULE: CAMPAIGN_PROGRESS // RAVEN GUARD</p>
        </div>
        <div style="margin-top: 1rem;">
            <a href="ob_sm.html" class="nav-tab">← VOLVER AL OOB</a>
        </div>
    </header>

    <main style="padding: 2rem; max-width: 1200px; margin: 0 auto;">
        
        <!-- LOADING STATE -->
        <div id="loading" class="loader-container">
            <i class="fas fa-cog cog-spinner"></i>
            <p class="sub-readout">[SISTEMA]: ESTABLECIENDO VÍNCULO CON EL ARCHIVO DEL CAPÍTULO...</p>
        </div>

        <!-- PANTALLA 1: SELECCIÓN DE JURAMENTO -->
        <div id="setup-screen" class="hidden">
            <section class="panel setup-card">
                <div class="panel-header"><span>NUEVO_JURAMENTO</span></div>
                <p style="margin: 1.5rem 0;">No se ha detectado ninguna campaña activa. Debes jurar un nuevo Oathsworn antes de comenzar.</p>
                
                <div style="margin-bottom: 2rem; text-align: left;">
                    <label class="stat-badge">Juramentos Disponibles:</label>
                    <select id="campaign-selector" class="input-cogitator" style="font-size: 1.1rem;">
                        <option value="">-- SELECCIONAR --</option>
                    </select>
                </div>

                <button onclick="startCampaign()" class="nav-tab" style="width: 100%; padding: 1rem;">
                    JURAR Y COMENZAR
                </button>
            </section>
        </div>

        <!-- PANTALLA 2: TRACKER ACTIVO -->
        <div id="tracker-screen" class="hidden">
            <div class="panel oath-panel" style="margin-bottom: 2rem;">
                <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <span>JURAMENTO_ACTIVO: <span id="active-campaign-name" style="color: var(--primary);">---</span></span>
                    <button onclick="resetCampaign()" style="background: none; border: 1px solid var(--danger); color: var(--danger); font-size: 0.7rem; padding: 0.3rem 0.6rem; cursor: pointer;">ABANDONAR JURAMENTO</button>
                </div>
            </div>

            <div id="battles-container" class="battle-grid">
                <!-- Injected by JS -->
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxOGshWBF3KviGBkurNrjhQvku6Ahm8Q4ebX8LHZkNczGZkibe9LqVTEnKwxsj3W-kE/exec";
        let loadedData = null;

        async function loadTracker() {
            showLoading(true);
            try {
                const response = await fetch(API_URL);
                loadedData = await response.json();
                renderApp();
            } catch (error) {
                console.error("Error:", error);
                alert("[ERROR]: FALLO EN LA CONEXIÓN CON EL COGITATOR.");
            } finally {
                showLoading(false);
            }
        }

        function renderApp() {
            const activeName = loadedData.activeCampaign.name;
            if (!activeName) {
                document.getElementById('tracker-screen').classList.add('hidden');
                document.getElementById('setup-screen').classList.remove('hidden');
                populateCampaignSelector();
            } else {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('tracker-screen').classList.remove('hidden');
                document.getElementById('active-campaign-name').textContent = activeName;
                renderBattles();
            }
        }

        function populateCampaignSelector() {
            const selector = document.getElementById('campaign-selector');
            selector.innerHTML = '<option value="">-- SELECCIONAR --</option>';
            loadedData.availableCampaigns.forEach(camp => {
                selector.innerHTML += `<option value="${camp.name}">${camp.name}</option>`;
            });
        }

        async function startCampaign() {
            const selectedCampaign = document.getElementById('campaign-selector').value;
            if (!selectedCampaign) return;
            if (!confirm(`¿Juras solemnemente cumplir con "${selectedCampaign}"?`)) return;
            await sendApiRequest({ action: 'START', campaignName: selectedCampaign });
        }

        function renderBattles() {
            const container = document.getElementById('battles-container');
            container.innerHTML = '';
            const campaign = loadedData.activeCampaign;

            campaign.battles.forEach(battle => {
                let agendaOptions = `<option value="">---</option>`;
                campaign.agendas.forEach(agenda => {
                    const selected = (agenda === battle.agenda) ? 'selected' : '';
                    agendaOptions += `<option value="${agenda}" ${selected}>${agenda}</option>`;
                });

                container.innerHTML += `
                    <div class="battle-card ${battle.points ? 'completed' : ''}">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                            <span class="sub-readout">BATALLA_${battle.id}</span>
                            ${battle.points ? '<span style="color: var(--success); font-size: 0.7rem;">[REGISTRADA]</span>' : ''}
                        </div>
                        
                        <div style="margin-bottom: 1rem;">
                            <span class="stat-badge">Agenda Jurada</span>
                            <select id="agenda-${battle.id}" class="input-cogitator">
                                ${agendaOptions}
                            </select>
                        </div>

                        <div class="grid-2" style="margin-bottom: 1rem;">
                            <div>
                                <span class="stat-badge">Puntos Jugados</span>
                                <input type="number" id="points-${battle.id}" value="${battle.points}" class="input-cogitator" style="text-align: center;">
                            </div>
                            <div>
                                <span class="stat-badge">Honour</span>
                                <input type="number" id="honour-${battle.id}" value="${battle.honour}" class="input-cogitator" style="text-align: center;">
                            </div>
                        </div>

                        <button onclick="saveBattle(${battle.id}, this)" class="nav-tab" style="width: 100%; font-size: 0.8rem; padding: 0.5rem;">
                            GUARDAR RESULTADO
                        </button>
                    </div>
                `;
            });
        }

        async function saveBattle(battleId, btnElement) {
            const originalText = btnElement.textContent;
            btnElement.textContent = "TRANSMITIENDO...";
            btnElement.disabled = true;

            const payload = {
                action: 'SAVE_BATTLE',
                battleId: battleId,
                agenda: document.getElementById(`agenda-${battleId}`).value,
                points: document.getElementById(`points-${battleId}`).value,
                honour: document.getElementById(`honour-${battleId}`).value
            };

            await sendApiRequest(payload, false);
            btnElement.textContent = "[ÉXITO]";
            btnElement.style.borderColor = "var(--success)";
            setTimeout(() => {
                btnElement.textContent = originalText;
                btnElement.disabled = false;
                btnElement.style.borderColor = "";
            }, 2000);
        }

        async function resetCampaign() {
            if (confirm("¿ESTÁS SEGURO? Se borrará todo el progreso del juramento actual.")) {
                 await sendApiRequest({ action: 'RESET' });
            }
        }

        async function sendApiRequest(payload, reload = true) {
            showLoading(true);
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify(payload)
                });
                if (reload) await loadTracker();
                else showLoading(false);
            } catch (error) {
                alert("[ERROR]: FALLO EN LA TRANSMISIÓN.");
                showLoading(false);
            }
        }

        function showLoading(isLoading) {
            const loading = document.getElementById('loading');
            const setup = document.getElementById('setup-screen');
            const tracker = document.getElementById('tracker-screen');
            if (isLoading) {
                loading.classList.remove('hidden');
                setup.classList.add('hidden');
                tracker.classList.add('hidden');
            } else {
                loading.classList.add('hidden');
            }
        }

        loadTracker();
    </script>
</body>
</html>
