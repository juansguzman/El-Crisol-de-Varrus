<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGITATOR: SKULL_TITHE</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="globals.css">
    <style>
        .skulls-panel { border-left-color: var(--danger); }
        
        .unit-card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .unit-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .skull-tracker-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .skull-display {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            padding: 0.5rem;
            border-radius: 4px;
            flex: 1;
            min-height: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .control-btn {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 35px;
            height: 35px;
            cursor: pointer;
            transition: 0.2s;
        }

        .control-btn:hover {
            border-color: var(--danger);
            background: var(--primary-glow);
        }

        .harvest-btn {
            background: none;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.3rem 0.6rem;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }

        .harvest-btn:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 10px var(--danger);
        }

        .stat-val {
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            color: var(--danger);
            width: 30px;
            text-align: center;
        }

        .skull-icon { font-size: 1.2rem; }
        .skull-legendary { color: var(--secondary); text-shadow: 0 0 5px var(--secondary); }
        .skull-normal { color: var(--text-dim); }

        #save-changes-button {
            padding: 1rem 2rem;
            background: var(--primary-dim);
            border: 1px solid var(--primary);
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }

        #save-changes-button:hover:not(:disabled) {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        #save-changes-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }
    </style>
</head>
<body class="antialiased">
    <div class="hud-vignette"></div>

    <header class="main-header">
        <div class="title-container">
            <h1>DIEZMO DE CRÁNEOS</h1>
            <p class="sub-readout">COGITATOR MODULE: SKULL_COLLECTION // LEGION: XII - WORLD EATERS</p>
        </div>
        <div style="margin-top: 1rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem;">
            <a href="index.html" class="nav-tab">← VOLVER AL TABLERO</a>
            <a href="ob_we.html" class="nav-tab" style="color: var(--danger); border-color: var(--danger);">ORDEN DE BATALLA →</a>
        </div>
    </header>

    <main style="padding: 2rem; max-width: 1200px; margin: 0 auto;">
        <section class="panel skulls-panel">
            <div class="panel-header">
                <span>REGISTRO_DIEZMO: WE_BLOOD_FOR_KHORNE</span>
                <button id="save-changes-button" onclick="sendUpdates()" disabled>Guardar Diezmo (0)</button>
            </div>
            
            <p id="loading-message" class="sub-readout" style="margin-bottom: 2rem; color: var(--danger);">[SISTEMA]: SINCRONIZANDO CON EL TRONO DE CRÁNEOS...</p>

            <div id="skulls-list-container">
                <!-- Injected by JS -->
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 2rem; color: var(--text-dim); border-top: 1px solid var(--border);">
        <p>&copy; 2025 Campaña "El Crisol de Varrus". ¡SANGRE PARA EL DIOS DE LA SANGRE!</p>
    </footer>

    <script>
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxmfS3fFZOiNX2edYerxkVngH2Ne3SIe2Jkj2zhJdUTPklffL_9a_k9HgioYyDNOY6L/exec"; 
        let updatesQueue = {}; 
        let initialData = [];

        function renderSkulls(container, count, isLegendary) {
            if (!container) return;
            container.innerHTML = '';
            const icon = '💀';
            const cls = isLegendary ? 'skull-legendary' : 'skull-normal';
            for (let i = 0; i < count; i++) {
                const s = document.createElement('span');
                s.textContent = icon;
                s.className = `skull-icon ${cls}`;
                container.appendChild(s);
            }
        }

        function handleQueueUpdate(nombreUnidad, campo, nv, iv) {
            const saveButton = document.getElementById('save-changes-button');
            const key = `${nombreUnidad}_${campo}`;
            if (!updatesQueue[key]) {
                updatesQueue[key] = { nombreUnidad, campo, valorInicial: iv, valorFinal: nv };
            } else {
                updatesQueue[key].valorFinal = nv;
            }
            if (updatesQueue[key].valorFinal === updatesQueue[key].valorInicial) delete updatesQueue[key];
            const pc = Object.keys(updatesQueue).length;
            saveButton.disabled = pc === 0;
            saveButton.textContent = `Guardar Diezmo (${pc})`;
        }

        function harvestUnit(nombreUnidad) {
            const sn = nombreUnidad.replace(/\s/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
            ['skulls', 'legendary_skulls'].forEach(f => {
                const numEl = document.getElementById(`${f}-number-${sn}`);
                const visEl = document.getElementById(`${f}-visual-${sn}`);
                const iv = parseInt(numEl.dataset.initialValue);
                numEl.textContent = '0';
                renderSkulls(visEl, 0, f === 'legendary_skulls');
                handleQueueUpdate(nombreUnidad, f, 0, iv);
            });
        }

        async function fetchAndRenderList() {
            const lm = document.getElementById('loading-message');
            const lc = document.getElementById('skulls-list-container');
            const sb = document.getElementById('save-changes-button');
            updatesQueue = {};
            try {
                const response = await fetch(APP_SCRIPT_URL);
                initialData = await response.json();
                let html = '';
                initialData.forEach(unit => {
                    const sn = unit.nombre.replace(/\s/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
                    html += `
                        <div class="unit-card">
                            <div class="unit-card-header">
                                <div>
                                    <h4 style="color: var(--danger); font-family: 'Orbitron', sans-serif;">${unit.nombre}</h4>
                                    <p class="sub-readout" style="font-size: 0.7rem;">${unit.tipo}</p>
                                </div>
                                <button onclick="harvestUnit('${unit.nombre}')" class="harvest-btn">COSECHAR</button>
                            </div>
                            
                            <div class="skull-tracker-row">
                                <span class="sub-readout" style="width: 100px;">CRÁNEOS</span>
                                <button onclick="addToQueue('${unit.nombre}', 'skulls', 'decremento', false)" class="control-btn">-</button>
                                <span id="skulls-number-${sn}" data-initial-value="${unit.skulls}" class="stat-val">${unit.skulls}</span>
                                <button onclick="addToQueue('${unit.nombre}', 'skulls', 'incremento', false)" class="control-btn">+</button>
                                <div id="skulls-visual-${sn}" class="skull-display"></div>
                            </div>

                            <div class="skull-tracker-row">
                                <span class="sub-readout" style="width: 100px; color: var(--secondary);">LEGENDARIOS</span>
                                <button onclick="addToQueue('${unit.nombre}', 'legendary_skulls', 'decremento', true)" class="control-btn">-</button>
                                <span id="legendary_skulls-number-${sn}" data-initial-value="${unit.legendary_skulls}" class="stat-val">${unit.legendary_skulls}</span>
                                <button onclick="addToQueue('${unit.nombre}', 'legendary_skulls', 'incremento', true)" class="control-btn">+</button>
                                <div id="legendary_skulls-visual-${sn}" class="skull-display"></div>
                            </div>
                        </div>
                    `;
                });
                lc.innerHTML = html;
                lm.style.display = 'none';
                initialData.forEach(unit => {
                    const sn = unit.nombre.replace(/\s/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
                    renderSkulls(document.getElementById(`skulls-visual-${sn}`), unit.skulls, false);
                    renderSkulls(document.getElementById(`legendary_skulls-visual-${sn}`), unit.legendary_skulls, true);
                });
                sb.disabled = true;
            } catch (error) {
                lm.textContent = `[ERROR]: ${error.message}`;
            }
        }

        function addToQueue(nombreUnidad, campo, accion, isLegendary) {
            const sn = nombreUnidad.replace(/\s/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
            const numEl = document.getElementById(`${campo}-number-${sn}`);
            const visEl = document.getElementById(`${campo}-visual-${sn}`);
            let nv = (accion === 'incremento') ? parseInt(numEl.textContent) + 1 : Math.max(0, parseInt(numEl.textContent) - 1);
            numEl.textContent = nv;
            renderSkulls(visEl, nv, isLegendary);
            handleQueueUpdate(nombreUnidad, campo, nv, parseInt(numEl.dataset.initialValue));
        }

        async function sendUpdates() {
            const sb = document.getElementById('save-changes-button');
            sb.disabled = true;
            sb.textContent = 'TRANSMITIENDO...';
            const changes = Object.values(updatesQueue).map(i => ({ nombreUnidad: i.nombreUnidad, campo: i.campo, valor: i.valorFinal }));
            try {
                const response = await fetch(APP_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'UPDATE_BATCH', changes })
                });
                const result = await response.json();
                if (result.success) {
                    alert('[DIEZMO REGISTRADO]: KHORNE ESTÁ COMPLACIDO.');
                    fetchAndRenderList();
                } else throw new Error(result.message);
            } catch (error) {
                alert('[ERROR]: FALLO EN LA TRANSMISIÓN.');
                sb.disabled = false;
            }
        }

        window.onload = fetchAndRenderList;
    </script>
</body>
</html>
